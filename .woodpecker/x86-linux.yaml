{
  "labels": {
    "backend": "local",
    "platform": "linux/amd64"
  },
  "steps": [
    {
      "commands": [
        "attic login lounge-rocks https://cache.lounge.rocks $ATTIC_KEY --set-default"
      ],
      "environment": {
        "ATTIC_KEY": {
          "from_secret": "attic_key"
        }
      },
      "image": "bash",
      "name": "Setup Attic"
    },
    {
      "commands": [
        "nix-fast-build --no-nom --skip-cached --attic-cache lounge-rocks:nix-cache --flake \".#checks.x86_64-linux\""
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Build all outputs for this architecture"
    },
    {
      "commands": [
        "test -e 'result-desktop'",
        "test -e 'result-mobi'",
        "echo 'All builds succeeded.'"
      ],
      "image": "bash",
      "name": "Verify all builds succeeded"
    },
    {
      "commands": [
        "nix build --print-out-paths '.#nixosConfigurations.desktop.config.system.build.toplevel' -o 'result-desktop'"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Rebuild desktop (diagnostic)",
      "when": {
        "status": "failure"
      }
    },
    {
      "commands": [
        "nix path-info --closure-size -h $(readlink -f 'result-desktop')"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Show desktop info",
      "when": {
        "status": [
          "failure",
          "success"
        ]
      }
    },
    {
      "commands": [
        "nix build --print-out-paths '.#nixosConfigurations.mobi.config.system.build.toplevel' -o 'result-mobi'"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Rebuild mobi (diagnostic)",
      "when": {
        "status": "failure"
      }
    },
    {
      "commands": [
        "nix path-info --closure-size -h $(readlink -f 'result-mobi')"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Show mobi info",
      "when": {
        "status": [
          "failure",
          "success"
        ]
      }
    }
  ],
  "when": [
    {
      "event": "manual"
    },
    {
      "branch": "main",
      "event": "push"
    },
    {
      "branch": "update_flake_lock_action",
      "event": "push"
    }
  ]
}
